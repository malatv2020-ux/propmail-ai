<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropMail AI — Email Writer for Real Estate Agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0e0c;
    --paper: #faf8f4;
    --cream: #f2ede4;
    --gold: #c9a84c;
    --gold-light: #f0e4c4;
    --rust: #b85c38;
    --sage: #4a6741;
    --muted: #7a7468;
    --border: #ddd8ce;
    --radius: 12px;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --ink: #f0ece4;
    --paper: #18170f;
    --cream: #201f14;
    --gold: #d4a94e;
    --gold-light: #2a2310;
    --rust: #d4704a;
    --sage: #6a9067;
    --muted: #8a8478;
    --border: #2e2c20;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
    transition: background var(--transition), color var(--transition);
  }

  /* --- HEADER --- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background var(--transition), border-color var(--transition);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .logo-name {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.3px;
  }

  .logo-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 2px 7px;
    border-radius: 20px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 13px;
    color: var(--muted);
  }

  .header-tagline { display: none; }
  @media (min-width: 600px) { .header-tagline { display: block; } }

  /* Dark mode toggle */
  .dark-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: var(--cream);
    cursor: pointer;
    transition: all var(--transition);
    color: var(--muted);
    flex-shrink: 0;
  }

  .dark-toggle:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-light);
  }

  .dark-icon-sun { display: none; }
  .dark-icon-moon { display: block; }
  [data-theme="dark"] .dark-icon-sun { display: block; }
  [data-theme="dark"] .dark-icon-moon { display: none; }

  /* --- LAYOUT --- */
  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 65px);
  }

  /* --- LEFT PANEL (FORM) --- */
  .panel-form {
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    overflow-y: auto;
    background: var(--cream);
  }

  .panel-title {
    font-family: var(--font-display);
    font-size: 18px;
    margin-bottom: 24px;
    color: var(--ink);
  }

  .email-types {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 28px;
  }

  .type-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
  }

  .type-btn:hover {
    border-color: var(--gold);
    background: var(--gold-light);
  }

  .type-btn.active {
    border-color: var(--gold);
    background: var(--gold-light);
    box-shadow: inset 0 0 0 1px var(--gold);
  }

  .type-icon {
    font-size: 18px;
    line-height: 1;
  }

  .type-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
  }

  .type-sub {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.3;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 24px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 13px;
    transition: border-color 0.15s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .tone-row {
    display: flex;
    gap: 8px;
  }

  .tone-opt {
    flex: 1;
    padding: 8px;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    background: var(--paper);
    color: var(--muted);
    transition: all 0.15s;
  }

  .tone-opt.active {
    border-color: var(--rust);
    background: #fdf0eb;
    color: var(--rust);
  }

  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 28px;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.01em;
  }

  .generate-btn:hover:not(:disabled) {
    background: #2a2820;
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* --- RIGHT PANEL (OUTPUT) --- */
  .panel-output {
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .output-title {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--ink);
  }

  .output-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .action-btn:hover:not(:disabled) {
    border-color: var(--ink);
    background: var(--cream);
  }

  .action-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .action-btn.copied {
    border-color: var(--sage);
    color: var(--sage);
    background: #eef3ed;
  }

  /* Empty State */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    color: var(--muted);
    padding: 60px 20px;
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .empty-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--ink);
    opacity: 0.5;
  }

  .empty-sub {
    font-size: 14px;
    max-width: 320px;
    line-height: 1.6;
  }

  .quick-tips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }

  .quick-tip {
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--cream);
    color: var(--muted);
  }

  /* Email Output Card */
  .email-output {
    display: none;
    flex-direction: column;
    gap: 0;
    flex: 1;
  }

  .email-output.visible {
    display: flex;
  }

  .email-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 16px 20px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: none;
  }

  .meta-row-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-size: 13px;
  }

  .meta-key {
    font-weight: 500;
    color: var(--muted);
    min-width: 60px;
    font-size: 12px;
  }

  .meta-val {
    color: var(--ink);
    font-weight: 500;
  }

  .subject-line {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
  }

  .email-body-wrap {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius);
    background: var(--paper);
    overflow: hidden;
  }

  .email-body {
    padding: 28px 32px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 200px;
  }

  /* Loading state */
  .loading-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--rust), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 2px;
    display: none;
  }

  .loading-bar.active {
    display: block;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .streaming-cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: var(--gold);
    animation: blink 0.8s infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* Footer stats */
  .output-footer {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* History sidebar strip */
  .history-strip {
    margin-top: 28px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .history-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .history-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 220px;
    overflow-y: auto;
  }

  .history-item {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--paper);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .history-item:hover {
    border-color: var(--gold);
  }

  .history-item-type {
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .history-item-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Error */
  .error-msg {
    display: none;
    padding: 14px 18px;
    background: #fdf0eb;
    border: 1px solid #e8b49a;
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--rust);
    margin-bottom: 16px;
  }

  .error-msg.visible {
    display: block;
  }

  /* API key notice */
  .api-notice {
    background: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 12px;
    color: #7a5c1e;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .api-notice strong {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
  }

  /* Mobile tab switcher */
  .mobile-tabs {
    display: none;
    position: sticky;
    top: 57px;
    z-index: 90;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }

  .mobile-tab-row {
    display: flex;
  }

  .mobile-tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all var(--transition);
    font-family: var(--font-body);
  }

  .mobile-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Skeleton loading */
  @keyframes skeleton-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  .skeleton-wrap {
    display: none;
    flex-direction: column;
    gap: 12px;
    padding: 28px 32px;
  }

  .skeleton-wrap.active {
    display: flex;
  }

  .skeleton-line {
    height: 14px;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--cream) 25%, var(--border) 50%, var(--cream) 75%);
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.4s ease infinite, skeleton-pulse 1.4s ease infinite;
  }

  @keyframes skeleton-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-line.w-full { width: 100%; }
  .skeleton-line.w-80 { width: 80%; }
  .skeleton-line.w-60 { width: 60%; }
  .skeleton-line.w-90 { width: 90%; }
  .skeleton-line.w-70 { width: 70%; }

  /* Loading bar improvement */
  .loading-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--rust), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 1.2s ease infinite;
    border-radius: 2px;
    display: none;
    transition: opacity 0.3s;
  }

  .loading-bar.active { display: block; }

  /* Smooth transitions for panels */
  .panel-form, .panel-output {
    transition: background var(--transition), border-color var(--transition);
  }

  input, select, textarea {
    transition: border-color 0.15s, background var(--transition), color var(--transition);
  }

  .type-btn, .tone-opt, .action-btn, .history-item, .api-notice, .error-msg, .email-meta, .email-body-wrap {
    transition: background var(--transition), border-color var(--transition), color var(--transition);
  }

  [data-theme="dark"] .email-body {
    color: var(--ink);
    background: var(--paper);
  }

  [data-theme="dark"] .api-notice {
    color: #d4a94e;
  }

  [data-theme="dark"] .api-notice a {
    color: #d4a94e;
  }

  [data-theme="dark"] .generate-btn {
    background: #d4a94e;
    color: #18170f;
  }

  [data-theme="dark"] .generate-btn:hover:not(:disabled) {
    background: #c49a3e;
  }
  @media (max-width: 768px) {
    header { padding: 12px 16px; }

    .mobile-tabs { display: block; }

    .app {
      grid-template-columns: 1fr;
      min-height: calc(100vh - 100px);
    }

    .panel-form {
      border-right: none;
      border-bottom: none;
      padding: 20px 16px;
      display: none;
    }

    .panel-form.mobile-active { display: block; }

    .panel-output {
      padding: 20px 16px;
      display: none;
    }

    .panel-output.mobile-active { display: flex; }

    .output-actions {
      flex-wrap: wrap;
      gap: 6px;
    }

    .action-btn {
      font-size: 11px;
      padding: 7px 10px;
    }

    .email-types {
      grid-template-columns: 1fr 1fr;
    }

    .email-body {
      padding: 18px 16px;
      font-size: 13px;
    }
  }

  .google-btn {
    width: 100%;
    padding: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 4px;
  }

  .google-btn:hover {
    border-color: #4285F4;
    background: var(--cream);
  }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    color: var(--muted);
    font-size: 12px;
  }

  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .auth-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .auth-overlay.active { display: flex; }

  .auth-card {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    margin: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .auth-logo {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .auth-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .auth-tabs {
    display: flex;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 24px;
    gap: 0;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1.5px;
    font-family: var(--font-body);
    transition: all 0.15s;
  }

  .auth-tab.active {
    color: var(--ink);
    border-bottom-color: var(--gold);
  }

  .auth-field {
    margin-bottom: 16px;
  }

  .auth-field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    display: block;
  }

  .auth-field input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .auth-field input:focus { border-color: var(--gold); }

  .auth-submit {
    width: 100%;
    padding: 13px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.18s;
  }

  .auth-submit:hover { background: #2a2820; }
  .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .auth-error {
    display: none;
    padding: 10px 14px;
    background: #fdf0eb;
    border: 1px solid #e8b49a;
    border-radius: 8px;
    font-size: 12px;
    color: var(--rust);
    margin-bottom: 14px;
  }

  .auth-error.visible { display: block; }

  .auth-success {
    display: none;
    padding: 10px 14px;
    background: #eef3ed;
    border: 1px solid #b0ccad;
    border-radius: 8px;
    font-size: 12px;
    color: var(--sage);
    margin-bottom: 14px;
  }

  .auth-success.visible { display: block; }

  .auth-trial-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    line-height: 1.5;
  }

  .auth-trial-note strong { color: var(--gold); }

  /* User info di header */
  .user-info {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .user-info.visible { display: flex; }

  .user-email {

async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    onLoggedIn(session.user);
  }
}

function onLoggedIn(user) {
  document.getElementById('auth-overlay').classList.remove('active');
  document.getElementById('main-app').classList.remove('app-blur');
  document.getElementById('user-info').classList.add('visible');
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('trial-btn').style.display = 'none';
}

function onLoggedOut() {
  document.getElementById('auth-overlay').classList.add('active');
  document.getElementById('main-app').classList.add('app-blur');
  document.getElementById('user-info').classList.remove('visible');
  document.getElementById('trial-btn').style.display = '';
}

async function signInWithGoogle() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://propmail-ai.vercel.app'
    }
  });
  if (error) showAuthError(error.message);
}
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  clearAuthMessages();

  if (!email || !password) {
    showAuthError('Please fill in all fields.');
    return;
  }

  const btn = document.querySelector('#login-form .auth-submit');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = 'Sign In →';

  if (error) {
    showAuthError(error.message);
  } else {
    onLoggedIn(data.user);
  }
}

async function signUp() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  clearAuthMessages();

  if (!email || !password) {
    showAuthError('Please fill in all fields.');
    return;
  }

  if (password.length < 6) {
    showAuthError('Password must be at least 6 characters.');
    return;
  }

  const btn = document.querySelector('#register-form .auth-submit');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  const { data, error } = await supabase.auth.signUp({ email, password });

  btn.disabled = false;
  btn.textContent = 'Create Account →';

  if (error) {
    showAuthError(error.message);
  } else {
    showAuthSuccess('Account created! Check your email to confirm, then sign in.');
    switchAuthTab('login', document.querySelectorAll('.auth-tab')[0]);
  }
}

async function signOut() {
  await supabase.auth.signOut();
  onLoggedOut();
}

function switchAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  clearAuthMessages();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('visible');
}

function showAuthSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg;
  el.classList.add('visible');
}

function clearAuthMessages() {
  document.getElementById('auth-error').classList.remove('visible');
  document.getElementById('auth-success').classList.remove('visible');
}

supabase.auth.onAuthStateChange((event, session) => {

    onLoggedIn(session.user);

});

- Under 200 words

Start with "Subject:" then blank line then email body.`,

    'cold-lead': `Write a ${tone} re-engagement email to a lead that has gone cold.
Lead name: ${clientName}
Agent: ${agentName}
Property / area they were interested in: ${property}
Last interaction context: ${context}

The email should:
- Not make them feel guilty for going quiet
- Reference their original interest naturally
- Offer something of value (market update, new listing, insight)
- Ask one simple low-pressure question
- Be short — under 130 words
- Feel genuinely human, not automated

Start with "Subject:" then blank line then email body.`,

    'offer': `Write a ${tone} offer submission email from a buyer's agent to a listing agent.
Buyer: ${clientName}
Agent submitting: ${agentName}
Property: ${property}
Offer details / terms: ${context}

The email should:
- Clearly state the intent and offer amount
- Highlight buyer's strengths (pre-approval, flexibility, etc.)
- List any key contingencies briefly
- Express genuine interest in the property
- Be professional and clear
- Under 180 words

Start with "Subject:" then blank line then email body.`,

    'objection': `Write a ${tone} email addressing a client objection or concern.
Client name: ${clientName}
Agent: ${agentName}
Property: ${property}
The objection / concern raised: ${context}

The email should:
- Acknowledge their concern with empathy
- Provide data or perspective to address it
- Reframe in a positive light without dismissing
- Suggest a next step
- Be reassuring and expert-sounding
- Under 180 words

Start with "Subject:" then blank line then email body.`,

    'market-update': `Write a ${tone} monthly market update email from a real estate agent to their database.
Agent: ${agentName}
Area / neighborhood focus: ${property || 'local market'}
Key data / trends to include: ${context}

The email should:
- Open with a compelling market insight (not "Hi, I'm your agent!")
- Share 2-3 concrete data points or trends
- Add one actionable tip for buyers or sellers
- Be conversational, not like a report
- End with a soft CTA to reach out
- Under 220 words

Start with "Subject:" then blank line then email body.`,

    'referral': `Write a ${tone} referral request email from a real estate agent to a past client.
Past client name: ${clientName}
Agent: ${agentName}
What you helped them with: ${context || 'buying/selling their home'}
Property / transaction: ${property}

The email should:
- Check in genuinely and warmly (not just asking for something)
- Briefly recall the positive experience you had together
- Make the referral ask feel natural and easy
- Explain how you help people they might know
- Be personal, not corporate
- Under 150 words

Start with "Subject:" then blank line then email body.`
  };

  return prompts[selectedType] || prompts['buyer-response'];
}

async function generateEmail() {
  if (isGenerating) return;

  isGenerating = true;
  clearError();

  const genBtn = document.getElementById('gen-btn');
  const loadingBar = document.getElementById('loading-bar');
  const emptyState = document.getElementById('empty-state');
  const emailOutput = document.getElementById('email-output');
  const emailBody = document.getElementById('email-body');
  const copyBtn = document.getElementById('copy-btn');
  const copySubjectBtn = document.getElementById('copy-subject-btn');
  const regenBtn = document.getElementById('regenerate-btn');
  const outputFooter = document.getElementById('output-footer');
  const skeletonWrap = document.getElementById('skeleton-wrap');

  genBtn.disabled = true;
  genBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0"/></svg> Generating...`;

  loadingBar.classList.add('active');
  emptyState.style.display = 'none';
  emailOutput.classList.remove('visible');
  skeletonWrap.classList.add('active');
  outputFooter.style.display = 'none';

  // Auto-switch ke tab output di mobile
  if (window.innerWidth <= 768) {
    const outputTab = document.querySelectorAll('.mobile-tab')[1];
    switchMobileTab('output', outputTab);
  }

  document.getElementById('out-to').textContent = document.getElementById('client-name').value || '—';
  document.getElementById('out-type').textContent = typeLabels[selectedType];
  document.getElementById('out-subject').textContent = 'Generating...';

  const style = document.createElement('style');
  style.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
  document.head.appendChild(style);

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        system: 'You are an expert real estate email copywriter with 15 years of experience. You write emails that sound genuinely human, professional, and effective. Never write generic templates — always make them feel personal and specific. Output only the email itself (subject line first, then body). No preamble, no "here is your email", no explanation.',
        messages: [{ role: 'user', content: buildPrompt() }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error: ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let subjectParsed = false;
    let streamStarted = false;

    emailBody.innerHTML = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            let newText = '';
            if (json.choices?.[0]?.delta?.content) {
              newText = json.choices[0].delta.content;
            } else if (json.type === 'content_block_delta' && json.delta?.text) {
              newText = json.delta.text;
            }
            if (!newText) continue;
            fullText += newText;

            // Hide skeleton, show output on first real content
            if (!streamStarted) {
              streamStarted = true;
              skeletonWrap.classList.remove('active');
              emailOutput.classList.add('visible');
            }

            if (!subjectParsed && fullText.includes('\n')) {
              const lines2 = fullText.split('\n');
              const subjectLine = lines2[0];
              if (subjectLine.toLowerCase().startsWith('subject:')) {
                currentSubject = subjectLine.replace(/^subject:\s*/i, '').trim();
                document.getElementById('out-subject').textContent = currentSubject;
                subjectParsed = true;
                const bodyText = lines2.slice(2).join('\n');
                emailBody.innerHTML = escapeHtml(bodyText) + '<span class="streaming-cursor"></span>';
              } else {
                emailBody.innerHTML = escapeHtml(fullText) + '<span class="streaming-cursor"></span>';
              }
            } else if (subjectParsed) {
              const lines2 = fullText.split('\n');
              const bodyText = lines2.slice(2).join('\n');
              emailBody.innerHTML = escapeHtml(bodyText) + '<span class="streaming-cursor"></span>';
            } else {
              emailBody.innerHTML = escapeHtml(fullText) + '<span class="streaming-cursor"></span>';
            }
          } catch (e) {}
        }
      }
    }

    emailBody.querySelectorAll('.streaming-cursor').forEach(c => c.remove());

    if (!subjectParsed) {
      const lines2 = fullText.split('\n');
      if (lines2[0].toLowerCase().startsWith('subject:')) {
        currentSubject = lines2[0].replace(/^subject:\s*/i, '').trim();
        document.getElementById('out-subject').textContent = currentSubject;
        const bodyText = lines2.slice(2).join('\n');
        emailBody.innerHTML = escapeHtml(bodyText);
      } else {
        emailBody.innerHTML = escapeHtml(fullText);
        currentSubject = '';
        document.getElementById('out-subject').textContent = '(no subject generated)';
      }
    }

    copyBtn.disabled = false;
    copySubjectBtn.disabled = false;
    regenBtn.disabled = false;
    outputFooter.style.display = 'flex';

    const words = emailBody.innerText.trim().split(/\s+/).length;
    document.getElementById('word-count').textContent = `${words} words`;
    document.getElementById('read-time').textContent = `~${Math.max(1, Math.round(words / 200))} min read`;

    addToHistory(typeLabels[selectedType], document.getElementById('client-name').value, currentSubject, fullText);

  } catch (err) {
    skeletonWrap.classList.remove('active');
    showError('Error: ' + err.message + '. Check your API key and try again.');
    emptyState.style.display = 'flex';
    emailOutput.classList.remove('visible');
  } finally {
    isGenerating = false;
    loadingBar.classList.remove('active');
    skeletonWrap.classList.remove('active');
    genBtn.disabled = false;
    genBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Generate Email`;
  }
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function copyEmail() {
  const text = document.getElementById('email-body').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg> Copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy email`;
    }, 2000);
  });
}

function copySubject() {
  navigator.clipboard.writeText(currentSubject).then(() => {
    const btn = document.getElementById('copy-subject-btn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg> Copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy subject`;
    }, 2000);
  });
}

function addToHistory(type, client, subject, fullText) {
  history.unshift({ type, client, subject, fullText, timestamp: new Date() });
  if (history.length > 6) history.pop();

  const strip = document.getElementById('history-strip');
  const list = document.getElementById('history-list');
  strip.style.display = 'block';

  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-item-type">${h.type}</div>
      <div class="history-item-sub">${h.client ? h.client + ' — ' : ''}${h.subject || 'Email'}</div>
    </div>
  `).join('');
}

function loadHistory(idx) {
  const h = history[idx];
  const emailOutput = document.getElementById('email-output');
  const emptyState = document.getElementById('empty-state');

  emptyState.style.display = 'none';
  emailOutput.classList.add('visible');

  document.getElementById('out-to').textContent = h.client || '—';
  document.getElementById('out-type').textContent = h.type;
  document.getElementById('out-subject').textContent = h.subject;
  currentSubject = h.subject;

  const lines = h.fullText.split('\n');
  const bodyText = lines[0].toLowerCase().startsWith('subject:') ? lines.slice(2).join('\n') : h.fullText;
  document.getElementById('email-body').innerHTML = escapeHtml(bodyText);
  document.getElementById('output-footer').style.display = 'flex';

  const words = bodyText.trim().split(/\s+/).length;
  document.getElementById('word-count').textContent = `${words} words`;
  document.getElementById('read-time').textContent = `~${Math.max(1, Math.round(words / 200))} min read`;

  document.getElementById('copy-btn').disabled = false;
  document.getElementById('copy-subject-btn').disabled = false;
  document.getElementById('regenerate-btn').disabled = false;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function clearError() {
  document.getElementById('error-msg').classList.remove('visible');
}
</script>
</body>
</html>
